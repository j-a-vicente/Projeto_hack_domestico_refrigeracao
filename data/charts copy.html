<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumo MOSFET0 - Watts e Ampere</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .container { width: 90%; max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        canvas { width: 100% !important; height: auto !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Monitoramento MOSFET0</h2>
    <canvas id="meuGrafico"></canvas>
</div>

<script>
async function carregarDados() {
    try {
        const resposta = await fetch('logs/mosfet0_01032026.log');
        const csvTexto = await resposta.text();
        
        const somaWatts = Array(24).fill(0);
        const somaAmpere = Array(24).fill(0); 
        const contagemHoras = Array(24).fill(0);

        const linhas = csvTexto.split('\n');
        
        for (let i = 1; i < linhas.length; i++) {
            const linha = linhas[i].replace(/"/g, '').trim();
            if (linha === "") continue;

            const partes = linha.split(',');
            const dataHora = partes[0]; 
            const valorOriginal = parseFloat(partes[2]); 

            const hora = parseInt(dataHora.substring(8, 10));
            
            // Watts = valor * 12
            const watts = valorOriginal * 12;

            if (!isNaN(hora) && !isNaN(valorOriginal)) {
                somaWatts[hora] += watts;
                somaAmpere[hora] += valorOriginal; // Coluna valor pura
                contagemHoras[hora]++;
            }
        }

        const dadosWatts = somaHorasParaMedia(somaWatts, contagemHoras);
        const dadosAmpere = somaHorasParaMedia(somaAmpere, contagemHoras);

        renderizarGrafico(dadosWatts, dadosAmpere);
    } catch (erro) {
        console.error("Erro ao carregar log:", erro);
    }
}

function somaHorasParaMedia(somaArray, contagemArray) {
    return somaArray.map((soma, index) => {
        return contagemArray[index] > 0 ? (soma / contagemArray[index]).toFixed(2) : 0;
    });
}

function renderizarGrafico(watts, amperes) {
    const ctx = document.getElementById('meuGrafico').getContext('2d');
    const labels = Array.from({length: 24}, (_, i) => i + "h");
    const linhaLimite = Array(24).fill(15);

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Watts (Cálculo)',
                    data: watts,
                    borderColor: 'rgb(75, 192, 192)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    tension: 0.3,
                    fill: true
                },
                {
                    label: 'Ampere (Original)',
                    data: amperes,
                    borderColor: 'rgb(153, 102, 255)',
                    tension: 0.3,
                    fill: false
                },
                {
                    label: 'Limite (15W)',
                    data: linhaLimite,
                    borderColor: 'red',
                    borderDash: [5, 5],
                    pointRadius: 0,
                    fill: false
                }
            ]
        },
        options: {
            responsive: true,
            scales: {
                y: { 
                    beginAtZero: true,
                    title: { display: true, text: 'Valores' }
                },
                x: {
                    title: { display: true, text: 'Hora do Dia' }
                }
            }
        }
    });
}

carregarDados();
</script>

</body>
</html>
